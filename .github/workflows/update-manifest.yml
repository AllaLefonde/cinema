name: Update film manifest

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: node scripts/build-manifest.mjs

      - name: Commit manifest if changed
        run: |
          if ! git diff --quiet -- films-data.js; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add films-data.js
            git commit -m "chore: update films-data.js"
            git push
          else
            echo "films-data.js already up to date"
          fi
